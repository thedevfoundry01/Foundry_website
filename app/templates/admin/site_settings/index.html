{% extends 'admin/layouts/app.html' %}
{% block title %}Site Settings{% endblock %}

{% block content %}
<div class="content-wrapper">
    <section class="content mt-4">
        <div class="container-fluid">
            <!-- Card Container -->
            <div class="card shadow-sm border-0 rounded-lg overflow-hidden">
                <!-- Card Header -->
                <div class="card-header bg-white border-bottom">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="card-title mb-0 text-dark">
                            <i class="fas fa-cogs me-2 text-primary"></i> Site Settings
                        </h3>
                        <a href="{{ url_for('admin.create_site_setting') }}" class="btn btn-primary btn-sm shadow-sm rounded-pill">
                            <i class="fas fa-plus me-1"></i> Add New
                        </a>
                    </div>
                </div>

                <!-- Card Body -->
                <div class="card-body table-responsive p-4">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-dark">
                            <tr>
                                <th style="width: 10%;" class="py-3">ID</th>
                                <th style="width: 30%;" class="py-3">Key</th>
                                <th style="width: 40%;" class="py-3">Value</th>
                                <th style="width: 20%; text-align: center;" class="py-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for setting in site_settings %}
                            <tr class="hover-shadow">
                                <td class="align-middle py-3">{{ setting.id }}</td>
                                <td class="align-middle py-3">{{ setting.key }}</td>
                                <td class="align-middle py-3">{{ setting.value }}</td>
                                <td class="text-center align-middle py-3">
                                    <div class="d-flex justify-content-center gap-3">
                                        <a href="{{ url_for('admin.edit_site_setting', id=setting.id) }}" class="text-dark" title="Edit">
                                            <i class="bi bi-pencil-square fs-5"></i>
                                        </a>
                                        <form action="{{ url_for('admin.delete_site_setting', id=setting.id) }}" method="post" class="d-inline">
                                            <button type="button" title="Delete" onclick="confirmDelete('{{ url_for('admin.delete_site_setting', id=setting.id) }}')" class="border-0 bg-transparent text-danger">
                                                <i class="bi bi-trash fs-5"></i>
                                            </button>
                                        </form>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}
