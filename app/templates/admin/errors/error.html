{% extends 'admin/layouts/app.html' %}

{% block title %}Error - {{ error_code }}{% endblock %}

{% block content %}
<div class="content-wrapper">
    <section class="content mt-4">
        <div class="container-fluid">
            <div class="error-page">
                <div class="error-content text-center">
                    <!-- Dynamic Error Code -->
                    <h1 class="display-1 text-gradient">{{ error_code }}</h1>
                    <!-- Dynamic Error Message -->
                    <h3 class="text-uppercase mb-4">{{ error_message }}</h3>
                    <p class="text-muted mb-4">
                        {{ error_description }}
                    </p>
                    <!-- Back to Dashboard Button -->
                    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-primary btn-lg">
                        <i class="fas fa-arrow-left me-2"></i> Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </section>
</div>

<!-- Custom Styles for Premium Look -->
<style>
    .error-page {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        background: #f8f9fa;
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    .error-content {
        max-width: 600px;
        margin: 0 auto;
    }
    .text-gradient {
        background: linear-gradient(135deg, #4e54c8, #8f94fb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 8rem;
        font-weight: bold;
        line-height: 1;
    }
    .btn-primary {
        background: linear-gradient(135deg, #4e54c8, #8f94fb);
        border: none;
        padding: 0.8rem 2rem;
        font-size: 1rem;
        font-weight: 500;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border-radius: 10px;
        color: #fff;
        text-decoration: none;
    }
    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 15px rgba(78, 84, 200, 0.3);
    }
    .text-uppercase {
        letter-spacing: 1px;
        font-weight: 600;
        color: #4e54c8;
    }
    .text-muted {
        font-size: 1.1rem;
        color: #666;
    }
</style>
{% endblock %}
