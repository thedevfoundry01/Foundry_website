<!-- Reusable Delete Confirmation Modal -->
<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg border-0 rounded-3 overflow-hidden">
      <!-- Modal Header -->
      <div class="modal-header bg-gradient bg-danger text-white py-3">
        <h5 class="modal-title fs-5 fw-bold" id="deleteConfirmModalLabel">
          <i class="fas fa-exclamation-triangle me-2"></i> Confirm Deletion
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body text-center py-4">
        <p class="fs-5 text-muted mb-4">
          Are you sure you want to delete this item? This action cannot be undone.
        </p>
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer border-0 d-flex justify-content-center py-3">
        <button type="button" class="btn btn-outline-secondary rounded-pill px-4 me-3" data-bs-dismiss="modal">
          <i class="fas fa-times me-2"></i> Cancel
        </button>
        <form id="deleteForm" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-danger rounded-pill px-4 bg-gradient">
            <i class="fas fa-trash-alt me-2"></i> Delete
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- JavaScript to Handle Modal & Form Submission -->
<script>
  function confirmDelete(url) {
    document.getElementById('deleteForm').action = url;
    var deleteModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
    deleteModal.show();
  }
</script>
