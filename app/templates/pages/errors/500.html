{% extends "layouts/app.html" %}

{% block title %}500 - {{ settings['website_name'] }}{% endblock %}

{% block meta %}
<meta name="description" content="Something went wrong on our end. We're working to fix it. Please try again later.">
{% endblock %}

{% block content %}
<!-- 500 Page -->
<div class="min-h-screen py-12 px-4 sm:px-6 lg:px-8 flex items-center justify-center bg-gradient-to-r from-red-50 to-orange-50">
    <div class="text-center max-w-2xl mx-auto">
        <!-- 500 Illustration -->
        <div class="max-w-md mx-auto">
            <img src="https://cdn-icons-png.flaticon.com/512/564/564619.png" alt="500 Illustration" class="w-48 h-48 mx-auto mb-8">
        </div>

        <!-- Error Message -->
        <h1 class="text-6xl font-bold text-gray-800 mb-4">500</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-6">Oops! Something Went Wrong</h2>
        <p class="text-gray-600 mb-8">
            Something went wrong on our end. We're working to fix it. Please try again later.
        </p>

        <!-- Back to Home Button -->
        <a href="/" class="inline-flex items-center px-6 py-3 bg-red-600 text-white font-semibold rounded-lg shadow-md hover:bg-red-700 transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-.707-10.293a1 1 0 00-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L9.414 11H13a1 1 0 100-2H9.414l1.293-1.293z" clip-rule="evenodd" />
            </svg>
            Go Back Home
        </a>
    </div>
</div>
{% endblock %}
