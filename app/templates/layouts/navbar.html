    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 lg:px-8">
            <div class="flex items-center justify-between py-4">
                <!-- Logo -->
                <a href="/" class="flex items-center space-x-2">
                    <img src="{{ url_for('static', filename='img/' + settings['website_logo']) }}" alt="{{ settings['website_name'] }} Logo" class="h-10 w-10 rounded-lg">
                    <span class="text-2xl font-bold text-blue-600 hover:text-red-800 transition-colors duration-300">
                        {{ settings['website_name'] }}
                    </span>
                </a>

                <!-- Navbar Links (Desktop) -->
                <div class="hidden md:flex items-center space-x-8">
                    <!-- Categories Dropdown -->
                    <div class="relative group">
                        <button class="text-gray-700 hover:text-blue-700 font-medium transition-colors duration-300 flex items-center">
                            Categories <i class="fas fa-chevron-down ml-2"></i>
                        </button>
                        <div class="absolute left-0 mt-2 w-48 bg-white shadow-lg rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-50">
                            {% for category in categories %}
                            <a href="{{ url_for('web.category_articles', slug=category.slug) }}" 
                             class="block px-4 py-2 text-blue-700 hover:bg-blue-100 transition-colors duration-300">
                                {{ category.name }}
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                    <a href="/articles" class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">Articles</a>
                    <a href="/about" class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">About</a>
                    <a href="/contact" class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">Contact</a>
                </div>

                <!-- Mobile Menu Toggle -->
                <button id="menu-toggle" class="md:hidden text-blue-700 focus:outline-none">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>

            <!-- Mobile Menu (Hidden by Default) -->
            <div id="mobile-menu" class="hidden md:hidden mt-4 space-y-4">
                <!-- Mobile Categories Dropdown -->
                <div class="relative">
                    <button id="mobile-category-toggle" class="block w-full text-left text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">
                        Categories <i class="fas fa-chevron-down ml-2"></i>
                    </button>
                    <div id="mobile-category-menu" class="hidden mt-2 bg-white shadow-lg rounded-lg">
                        {% for category in categories %}
                        <a href="{{ url_for('web.category_articles', slug=category.slug) }}" 
                        class="block px-4 py-2 text-gray-700 hover:bg-blue-100 transition-colors duration-300">
                            {{ category.name }}
                        </a>
                        {% endfor %}
                    </div>
                </div>

                <a href="/articles" class="block text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">Articles</a>
                <a href="/about" class="block text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">About</a>
                <a href="/contact" class="block text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">Contact</a>
            </div>
        </div>
    </nav>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');

        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // Toggle mobile category dropdown
        const categoryToggle = document.getElementById("mobile-category-toggle");
        const categoryMenu = document.getElementById("mobile-category-menu");

        categoryToggle.addEventListener("click", function (event) {
            event.stopPropagation(); // Prevents event bubbling
            categoryMenu.classList.toggle("hidden");
        });

        // Close category dropdown when clicking outside
        document.addEventListener("click", function (event) {
            if (!categoryToggle.contains(event.target) && !categoryMenu.contains(event.target)) {
                categoryMenu.classList.add("hidden");
            }
        });
    </script>
