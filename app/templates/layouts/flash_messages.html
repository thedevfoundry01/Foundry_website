{% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="fixed top-4 right-4 z-50 space-y-4">
            {% for category, message in messages %}
            <div class="relative p-4 pr-10 rounded-lg shadow-lg transform transition-all duration-300 ease-in-out hover:scale-105
                {% if category == 'success' %}
                    bg-green-50 text-green-800 border-l-4 border-green-500
                {% elif category == 'error' %}
                    bg-red-50 text-red-800 border-l-4 border-red-500
                {% elif category == 'warning' %}
                    bg-yellow-50 text-yellow-800 border-l-4 border-yellow-500
                {% else %}
                    bg-blue-50 text-blue-800 border-l-4 border-blue-500
                {% endif %}">
                <!-- Message Content -->
                <div class="flex items-center">
                    <!-- Icon -->
                    <div class="mr-3">
                        {% if category == 'success' %}
                            <i class="fas fa-check-circle text-green-500 text-xl"></i>
                        {% elif category == 'error' %}
                            <i class="fas fa-times-circle text-red-500 text-xl"></i>
                        {% elif category == 'warning' %}
                            <i class="fas fa-exclamation-circle text-yellow-500 text-xl"></i>
                        {% else %}
                            <i class="fas fa-info-circle text-blue-500 text-xl"></i>
                        {% endif %}
                    </div>
                    <!-- Message Text -->
                    <p class="text-sm font-medium">{{ message }}</p>
                </div>
                <!-- Close Button -->
                <button onclick="this.parentElement.remove();" class="absolute top-3 right-3 text-gray-500 hover:text-gray-800 transition duration-200">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}
